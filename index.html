// ─────────────────────────────────────────────────────────────────
//  SOUND ENGINE  (Web Audio API — no files, fully offline)
//
//  Three sounds:
//    SFX.land()   — landing on a planet (descending thud + rumble)
//    SFX.liftoff()— lifting off        (rising engine roar)
//    SFX.dock()   — docking at base    (soft chime sequence)
//
//  AudioContext is created on first user interaction to comply with
//  browser autoplay policy — it will silently skip until then.
// ─────────────────────────────────────────────────────────────────
const SFX = (() => {
  let ac = null;

  function ctx() {
    if (!ac) ac = new (window.AudioContext || window.webkitAudioContext)();
    return ac;
  }

  // Helper: create oscillator + gain, connect to output, auto-stop
  function osc(type, freq, startVol, endVol, startTime, duration, dest) {
    const c  = ctx();
    const o  = c.createOscillator();
    const g  = c.createGain();
    o.type   = type;
    o.frequency.setValueAtTime(freq, startTime);
    g.gain.setValueAtTime(startVol, startTime);
    g.gain.linearRampToValueAtTime(endVol, startTime + duration);
    o.connect(g);
    g.connect(dest || c.destination);
    o.start(startTime);
    o.stop(startTime + duration + 0.01);
  }

  // Helper: frequency ramp on an oscillator
  function oscRamp(type, freqStart, freqEnd, vol, startTime, duration, dest) {
    const c  = ctx();
    const o  = c.createOscillator();
    const g  = c.createGain();
    o.type   = type;
    o.frequency.setValueAtTime(freqStart, startTime);
    o.frequency.linearRampToValueAtTime(freqEnd, startTime + duration);
    g.gain.setValueAtTime(vol, startTime);
    g.gain.linearRampToValueAtTime(0, startTime + duration);
    o.connect(g);
    g.connect(dest || c.destination);
    o.start(startTime);
    o.stop(startTime + duration + 0.01);
  }

  return {

    // Landing: high-freq engine whine descending to a low thud
    land() {
      try {
        const c  = ctx();
        const t  = c.currentTime;
        // Engine whine descending
        oscRamp('sawtooth', 420, 60, 0.18, t,      0.7);
        // Low impact thud
        oscRamp('sine',     120, 30, 0.35, t + 0.6, 0.5);
        // Short rumble burst (noise-like via detuned saws)
        oscRamp('sawtooth',  80, 40, 0.12, t + 0.65, 0.4);
        oscRamp('sawtooth',  85, 38, 0.10, t + 0.65, 0.4);
      } catch(e) {}
    },

    // Liftoff: low rumble building to rising engine roar
    liftoff() {
      try {
        const c = ctx();
        const t = c.currentTime;
        // Initial ignition thump
        oscRamp('sine',     50, 90,  0.30, t,        0.25);
        // Engine building
        oscRamp('sawtooth', 80, 340, 0.20, t + 0.15, 0.8);
        oscRamp('sawtooth', 78, 350, 0.15, t + 0.15, 0.8);
        // High whine fading out as ship recedes
        oscRamp('square',  340, 600, 0.08, t + 0.7,  0.4);
      } catch(e) {}
    },

    // Docking: two-tone chime — friendly, station-like
    dock() {
      try {
        const c = ctx();
        const t = c.currentTime;
        osc('sine', 523, 0.22, 0,    t,        0.4);   // C5
        osc('sine', 784, 0.18, 0,    t + 0.22, 0.5);   // G5
        osc('sine', 261, 0.12, 0,    t + 0.5,  0.6);   // C4
      } catch(e) {}
    },

    // Warning alarm: two rising beeps — oxygen or fuel at 50%
    alarmWarn() {
      try {
        const c = ctx();
        const t = c.currentTime;
        // Two short ascending beeps
        osc('square', 440, 0.18, 0, t,        0.12);
        osc('square', 554, 0.18, 0, t + 0.18, 0.12);
      } catch(e) {}
    },

    // Critical alarm: rapid triple beep — oxygen or fuel at 25%
    alarmCrit() {
      try {
        const c = ctx();
        const t = c.currentTime;
        // Three urgent high beeps
        osc('square', 880, 0.22, 0, t,        0.10);
        osc('square', 880, 0.22, 0, t + 0.15, 0.10);
        osc('square', 880, 0.22, 0, t + 0.30, 0.10);
        // Low drone underneath
        osc('sawtooth', 110, 0.08, 0, t, 0.45);
      } catch(e) {}
    },

    // Hull hit: deep metallic clang — ship takes damage
    hullHit() {
      try {
        const c = ctx();
        const t = c.currentTime;
        // Metal impact — low thud + high ring
        oscRamp('sawtooth', 180, 40,  0.30, t,        0.3);
        oscRamp('sine',     900, 200, 0.12, t,        0.4);
        oscRamp('sine',     400, 100, 0.08, t + 0.05, 0.3);
      } catch(e) {}
    },

    // Crew hit: synthesised grunt — short voiced "oof"
    // Approximates the Minecraft hurt sound: voiced descending
    // pitch burst with breath noise, fast attack, fast decay.
    crewHit() {
      try {
        const c = ctx();
        const t = c.currentTime;

        // Noise burst (breath/impact component) via high-freq oscillator
        const noise = c.createOscillator();
        const nGain = c.createGain();
        const nFilter = c.createBiquadFilter();
        noise.type = 'sawtooth';
        noise.frequency.setValueAtTime(180, t);
        noise.frequency.linearRampToValueAtTime(60, t + 0.12);
        nFilter.type = 'bandpass';
        nFilter.frequency.value = 800;
        nFilter.Q.value = 0.8;
        nGain.gain.setValueAtTime(0.25, t);
        nGain.gain.linearRampToValueAtTime(0, t + 0.14);
        noise.connect(nFilter);
        nFilter.connect(nGain);
        nGain.connect(c.destination);
        noise.start(t); noise.stop(t + 0.15);

        // Voiced component — descending "uh" vowel shape
        const voiced = c.createOscillator();
        const vGain  = c.createGain();
        const vFilter = c.createBiquadFilter();
        voiced.type = 'sawtooth';
        voiced.frequency.setValueAtTime(220, t);
        voiced.frequency.linearRampToValueAtTime(130, t + 0.10);
        vFilter.type = 'lowpass';
        vFilter.frequency.setValueAtTime(1200, t);
        vFilter.frequency.linearRampToValueAtTime(400, t + 0.10);
        vGain.gain.setValueAtTime(0.20, t);
        vGain.gain.linearRampToValueAtTime(0, t + 0.13);
        voiced.connect(vFilter);
        vFilter.connect(vGain);
        vGain.connect(c.destination);
        voiced.start(t); voiced.stop(t + 0.15);

      } catch(e) {}
    },

  };
})();

// ─────────────────────────────────────────────────────────────────
//  SAVE / LOAD / AUTOSAVE
//
//  Three mechanisms:
//    autoSave()      — writes G to localStorage after every action
//    saveToFile()    — downloads G as prospector_save.json
//    loadFromFile()  — reads a .json file the player picks
//    loadFromStorage()— restores G from localStorage
//
//  G.visited is a plain Array (JSON-safe).
//  Everything else in G is primitives, arrays, plain objects — safe.
// ─────────────────────────────────────────────────────────────────
const SAVE_KEY = 'prospector_autosave';

function autoSave(){
  try {
    localStorage.setItem(SAVE_KEY, JSON.stringify(G));
  } catch(e) {
    // localStorage full or unavailable — silently skip
  }
}

function hasSave(){
  try { return !!localStorage.getItem(SAVE_KEY); }
  catch(e){ return false; }
}

function saveToFile(){
  try {
    const json = JSON.stringify(G, null, 2);
    const blob = new Blob([json], {type:'application/json'});
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href     = url;
    a.download = 'prospector_save.json';
    a.click();
    URL.revokeObjectURL(url);
    addLog('Game saved to file.','lg');
    renderAll();
  } catch(e) {
    addLog('Save to file failed.','lw');
  }
}

function loadFromFile(){
  const input = document.createElement('input');
  input.type  = 'file';
  input.accept= '.json,application/json';
  input.onchange = e => {
    const file = e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const loaded = JSON.parse(ev.target.result);
        // Basic sanity check
        if(!loaded.galaxy || !loaded.crew) throw new Error('Invalid save');
        G = loaded;
        addLog('Save file loaded. Welcome back, Captain.','lg');
        loadSprites().then(()=>{ renderAll(); autoSave(); });
      } catch(err) {
        alert('Could not load save file: ' + err.message);
      }
    };
    reader.readAsText(file);
  };
  input.click();
}

function loadFromStorage(){
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    if(!raw) return false;
    const loaded = JSON.parse(raw);
    if(!loaded.galaxy || !loaded.crew) return false;
    G = loaded;
    addLog('Autosave restored. Welcome back, Captain.','lg');
    return true;
  } catch(e){ return false; }
}

// Wrapper used by menu — reloads sprites before rendering after a load
function loadAndRender(loadFn){
  const ok = loadFn();
  if(ok) loadSprites().then(()=>renderAll());
  return ok;
}

// ─────────────────────────────────────────────────────────────────
//  MAIN MENU
// ─────────────────────────────────────────────────────────────────
let MENU_STATE = { hasAutosave: false, screen: 'main' }; // screen: 'main'|'options'

// ── Options (persisted to localStorage) ─────────────────────────
const OPT_KEY = 'prospector_options';
function loadOptions(){
  try {
    const raw = localStorage.getItem(OPT_KEY);
    if(raw) return JSON.parse(raw);
  } catch(e){}
  return { asciiMode: false };
}
function saveOptions(opts){
  try { localStorage.setItem(OPT_KEY, JSON.stringify(opts)); } catch(e){}
}
let OPTIONS = loadOptions();

function showMenu(){
  MENU_STATE.hasAutosave = hasSave();
  MENU_STATE.screen = 'main';
  MENU_STATE.optSel = 0;
  MENU_STATE.mainSel = 0;
  // Blank out G so render checks don't crash
  G = null;
  drawMenuScreen();
  hideMsg();
  document.getElementById('ctx-bar').innerHTML   = '';
  document.getElementById('h-mode').textContent  = 'MAIN MENU';
  document.getElementById('h-loc').textContent   = '—';
  document.getElementById('h-turn').textContent  = '—';
  document.getElementById('h-creds').textContent = '—';
  // Reset gauges
  const ff=document.getElementById('fuel-fill'); if(ff) ff.style.height='0%';
  const hf=document.getElementById('hull-fill'); if(hf) hf.style.height='0%';
  const of=document.getElementById('oxy-fill');  if(of) of.style.height='0%';
  document.getElementById('g-fuel').textContent='—';
  document.getElementById('g-hull').textContent='—';
  document.getElementById('g-oxy').textContent='—';
  // Show space gauges on menu
  document.getElementById('gauge-fuel').style.display='';
  document.getElementById('gauge-hull').style.display='';
  document.getElementById('gauge-oxy').style.display='none';
  document.getElementById('crew-list').innerHTML = '';
  document.getElementById('inv-list').innerHTML  = '';
  document.getElementById('log-list').innerHTML  = '';
}

function drawMenuScreen(){
  ctx.fillStyle='#050510';
  ctx.fillRect(0,0,canvas.width,canvas.height);
  // Starfield
  for(let i=0;i<120;i++){
    const sx=(Math.sin(i*137.5)*0.5+0.5)*canvas.width;
    const sy=(Math.cos(i*97.3)*0.5+0.5)*canvas.height;
    ctx.globalAlpha=0.3+((i*73)%100)/200;
    ctx.fillStyle='#ffffff';
    ctx.fillRect(sx,sy,i%3===0?2:1,i%3===0?2:1);
  }
  ctx.globalAlpha=1;
  const cx=canvas.width/2;

  if(MENU_STATE.screen==='options'){
    drawOptionsScreen(cx);
    return;
  }

  if(MENU_STATE.screen==='intro'){
    const cy = canvas.height/2;
    const lines = [
      'An unexplored sector of the galaxy.',
      '',
      'You are a private Prospector.',
      'You can earn money by mapping planets',
      'and finding resources.',
      '',
      'Your goal is to make sure you can live out',
      'your life in comfort in your retirement.',
      '',
      'But beware of alien lifeforms and pirates.',
      'You start your career with a nice Light Scout.',
      '',
      'You will use your keyboard keys to do various actions.',
      'Always check the context bar for hints.',
    ];
    const lineH = 26;
    const totalH = lines.length * lineH;
    let y = cy - totalH/2 + 10;
    ctx.textAlign = 'center';
    lines.forEach(line => {
      if(line === ''){ y += lineH * 0.5; return; }
      ctx.font = '16px Courier New';
      ctx.fillStyle = '#aaccee';
      ctx.fillText(line, cx, y);
      y += lineH;
    });
    ctx.font = 'bold 14px Courier New';
    ctx.fillStyle = '#ffe066';
    ctx.fillText('[ PRESS ENTER TO BEGIN ]', cx, cy + totalH/2 + 40);
    return;
  }

  // Title
  ctx.font='bold 39px Courier New'; ctx.fillStyle='#ffe066'; ctx.textAlign='center';
  ctx.fillText('PROSPECTOR',cx,100);
  ctx.font='17px Courier New'; ctx.fillStyle='#557799';
  ctx.fillText('A  R O G U E L I K E  I N  S P A C E',cx,130);
  ctx.fillStyle='#223344'; ctx.fillRect(cx-200,148,400,1);

  const opts=[];
  opts.push({key:'N', label:'New Game',       col:'#70f090'});
  if(MENU_STATE.hasAutosave) opts.push({key:'C', label:'Continue', col:'#70d8ff'});
  opts.push({key:'L', label:'Load Save File', col:'#aaaaff'});
  opts.push({key:'O', label:'Options',        col:'#ffaa44'});

  // Clamp selection in case Continue disappeared
  if(MENU_STATE.mainSel===undefined) MENU_STATE.mainSel=0;
  MENU_STATE.mainSel = Math.min(MENU_STATE.mainSel, opts.length-1);

  ctx.font='bold 19px Courier New';
  const _menuBtnRects = [];
  opts.forEach((o,i)=>{
    const sel = i===MENU_STATE.mainSel;
    const y=185+i*44;
    _menuBtnRects.push({i, x:cx-160, y:y-20, w:320, h:34});
    ctx.fillStyle= sel ? '#14142a' : '#0e0e1a';
    ctx.fillRect(cx-160,y-20,320,34);
    ctx.strokeStyle= sel ? '#6655cc' : '#2a2a4a';
    ctx.lineWidth= sel ? 2 : 1;
    ctx.strokeRect(cx-160,y-20,320,34);
    // Cursor arrow
    ctx.fillStyle= sel ? '#ffe066' : 'transparent';
    ctx.textAlign='left';
    if(sel) ctx.fillText('▶', cx-152, y+2);
    ctx.fillStyle= sel ? '#ffffff' : o.col;
    ctx.fillText(o.label, cx-128, y+2);
  });
  MENU_STATE._btnRects = _menuBtnRects;
  MENU_STATE._opts = opts;

  ctx.font='14px Courier New'; ctx.fillStyle='#334455'; ctx.textAlign='center';
  ctx.fillText('v0.08  —  Goal: retire with 10,000 cr',cx,canvas.height-16);
  ctx.textAlign='left';
}

function drawOptionsScreen(cx){
  ctx.font='bold 31px Courier New'; ctx.fillStyle='#ffaa44'; ctx.textAlign='center';
  ctx.fillText('OPTIONS',cx,90);
  ctx.fillStyle='#223344'; ctx.fillRect(cx-200,108,400,1);

  ctx.font='16px Courier New'; ctx.fillStyle='#556677'; ctx.textAlign='center';
  ctx.fillText('Use arrow keys to navigate,  Space / Enter to toggle',cx,134);

  const items=[
    {
      label: 'Render Mode',
      value: OPTIONS.asciiMode ? 'ASCII' : 'SPRITES',
      valueCol: OPTIONS.asciiMode ? '#ffe066' : '#70d8ff',
      desc:  OPTIONS.asciiMode
        ? 'Classic text characters — works without sprites'
        : 'Original Prospector pixel art sprites',
      sel: MENU_STATE.optSel===0,
    },
  ];

  items.forEach((item,i)=>{
    const y = 185 + i*80;
    const sel = item.sel;
    ctx.fillStyle = sel ? '#12122a' : '#0a0a16';
    ctx.fillRect(cx-220, y-28, 440, 60);
    ctx.strokeStyle = sel ? '#6655aa' : '#2a2a4a';
    ctx.lineWidth = sel ? 2 : 1;
    ctx.strokeRect(cx-220, y-28, 440, 60);

    // Label
    ctx.font = 'bold 15px Courier New'; ctx.textAlign='left';
    ctx.fillStyle = sel ? '#ddd' : '#888';
    ctx.fillText(item.label, cx-200, y-6);

    // ◄ VALUE ►
    ctx.font = 'bold 17px Courier New'; ctx.textAlign='center';
    ctx.fillStyle='#555577'; ctx.fillText('◄', cx-110, y+18);
    ctx.fillStyle=item.valueCol; ctx.fillText(item.value, cx, y+18);
    ctx.fillStyle='#555577'; ctx.fillText('►', cx+110, y+18);

    // Description
    ctx.font='14px Courier New'; ctx.fillStyle='#445566'; ctx.textAlign='center';
    ctx.fillText(item.desc, cx, y+36);
  });

  // Preview label
  ctx.font='15px Courier New'; ctx.fillStyle='#334455'; ctx.textAlign='center';
  ctx.fillText('[ ESC ]  Back to main menu',cx,canvas.height-16);
  ctx.textAlign='left';
}

// ─────────────────────────────────────────────────────────────────
//  MENU KEY HANDLER
// ─────────────────────────────────────────────────────────────────
// ── Menu mouse click support ──────────────────────────────────
canvas.addEventListener('click', e => {
  if(G !== null) return; // only active on menu screen
  if(MENU_STATE.screen !== 'main') return;
  if(!MENU_STATE._btnRects || !MENU_STATE._opts) return;

  // Get click position relative to canvas, accounting for CSS scaling
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width  / rect.width;
  const scaleY = canvas.height / rect.height;
  const mx = (e.clientX - rect.left) * scaleX;
  const my = (e.clientY - rect.top)  * scaleY;

  // Build activate function (mirrors handleMenuKey logic)
  const mainOpts = [];
  mainOpts.push('n');
  if(MENU_STATE.hasAutosave) mainOpts.push('c');
  mainOpts.push('l');
  mainOpts.push('o');

  function activateMainOpt(sel){
    if(sel==='n'){ MENU_STATE.screen='intro'; MENU_STATE.introOpenedAt=Date.now(); MENU_STATE.introEntryKeyStillHeld=false; drawMenuScreen(); }
    else if(sel==='c'){ if(loadFromStorage()){ loadSprites().then(()=>renderAll()); } else showMenu(); }
    else if(sel==='l'){ loadFromFile(); }
    else if(sel==='o'){ MENU_STATE.screen='options'; MENU_STATE.optSel=0; drawMenuScreen(); }
  }

  MENU_STATE._btnRects.forEach(btn => {
    if(mx >= btn.x && mx <= btn.x+btn.w && my >= btn.y && my <= btn.y+btn.h){
      MENU_STATE.mainSel = btn.i;
      activateMainOpt(mainOpts[btn.i]);
    }
  });
});

// ── Menu hover highlighting ───────────────────────────────────
canvas.addEventListener('mousemove', e => {
  if(G !== null) return;
  if(MENU_STATE.screen !== 'main') return;
  if(!MENU_STATE._btnRects) return;
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width  / rect.width;
  const scaleY = canvas.height / rect.height;
  const mx = (e.clientX - rect.left) * scaleX;
  const my = (e.clientY - rect.top)  * scaleY;
  let changed = false;
  let hovering = false;
  MENU_STATE._btnRects.forEach(btn => {
    if(mx >= btn.x && mx <= btn.x+btn.w && my >= btn.y && my <= btn.y+btn.h){
      hovering = true;
      if(MENU_STATE.mainSel !== btn.i){ MENU_STATE.mainSel = btn.i; changed = true; }
    }
  });
  canvas.style.cursor = hovering ? 'pointer' : 'default';
  if(changed) drawMenuScreen();
});

function handleMenuKey(e){
  const k=e.key.toLowerCase();

  if(MENU_STATE.screen==='options'){
    if(e.key==='Escape'){ MENU_STATE.screen='main'; drawMenuScreen(); return; }
    if(e.key===' '||e.key==='Enter'||e.key==='ArrowLeft'||e.key==='ArrowRight'){
      // Toggle the selected option
      if(MENU_STATE.optSel===0){
        OPTIONS.asciiMode=!OPTIONS.asciiMode;
        saveOptions(OPTIONS);
      }
      drawMenuScreen();
    }
    return;
  }

  // Intro screen — handled on keyup (separate listener below)
  if(MENU_STATE.screen==='intro') return;

  // Main menu — build option list to match what's drawn
  const mainOpts=[];
  mainOpts.push('n');
  if(MENU_STATE.hasAutosave) mainOpts.push('c');
  mainOpts.push('l');
  mainOpts.push('o');
  if(MENU_STATE.mainSel===undefined) MENU_STATE.mainSel=0;

  function activateMainOpt(sel){
    if(sel==='n'){ MENU_STATE.screen='intro'; MENU_STATE.introOpenedAt=Date.now(); MENU_STATE.introEntryKeyStillHeld=true; drawMenuScreen(); }
    else if(sel==='c'){ if(loadFromStorage()){ loadSprites().then(()=>renderAll()); } else showMenu(); }
    else if(sel==='l'){ loadFromFile(); }
    else if(sel==='o'){ MENU_STATE.screen='options'; MENU_STATE.optSel=0; drawMenuScreen(); }
  }

  if(e.key==='ArrowUp'){
    MENU_STATE.mainSel=(MENU_STATE.mainSel-1+mainOpts.length)%mainOpts.length;
    drawMenuScreen(); return;
  }
  if(e.key==='ArrowDown'){
    MENU_STATE.mainSel=(MENU_STATE.mainSel+1)%mainOpts.length;
    drawMenuScreen(); return;
  }
  if(e.key==='Enter'){
    activateMainOpt(mainOpts[MENU_STATE.mainSel]); return;
  }
  // Letter shortcuts still functional
  if(k==='n') activateMainOpt('n');
  else if(k==='c' && MENU_STATE.hasAutosave) activateMainOpt('c');
  else if(k==='l') activateMainOpt('l');
  else if(k==='o') activateMainOpt('o');
}

// ─────────────────────────────────────────────────────────────────
//  FULLSCREEN SCALING
//  Scales #root to fit the viewport while preserving aspect ratio.
//  The game's natural size is 1298×638. We calculate the scale
//  factor that fits it into the current window, then use
//  CSS transform + translate to centre it.
// ─────────────────────────────────────────────────────────────────
const GAME_W = 1400;
const GAME_H = 720;

function scaleToFit(){
  const root  = document.getElementById('root');
  const scaleX = window.innerWidth  / GAME_W;
  const scaleY = window.innerHeight / GAME_H;
  const scale  = Math.min(scaleX, scaleY);

  // Centre the scaled root in the viewport
  const tx = (window.innerWidth  - GAME_W * scale) / 2;
  const ty = (window.innerHeight - GAME_H * scale) / 2;

  root.style.transform = `translate(${tx}px, ${ty}px) scale(${scale})`;
}

window.addEventListener('resize', scaleToFit);
scaleToFit();

// Lightweight animation loop — only redraws when stranded (SOS pulse)
(function animLoop(){
  requestAnimationFrame(animLoop);
  if(G && !G.dead && !G.retired){
    if(G.stranded && G.stranded.sos) drawCanvas();
    else if(G.examine) drawCanvas();
  }
})();

// ── Start — show menu first ──────────────────────────────────────
showMenu();
</script>
